{% extends 'constructionapp/base.html' %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ action }} Project</h1>
  <a href="{% url 'project_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card p-4" style="max-width:650px">
  <form method="post">{% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Project Name *</label>
      <input name="name" class="form-control" value="{{ project.name|default:'' }}" placeholder="e.g. Patel Residence Building" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Client *</label>
      <select name="client" class="form-select" required>
        <option value="">-- Select Client --</option>
        {% for c in clients %}
          <option value="{{ c.pk }}" {% if project.client.pk == c.pk %}selected{% endif %}>{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Location *</label>
      <input name="location" class="form-control" value="{{ project.location|default:'' }}" placeholder="e.g. Ahmedabad, Gujarat" required>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label fw-semibold">Start Date *</label>
        <input name="start_date" type="date" class="form-control" value="{{ project.start_date|default:'' }}" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label fw-semibold">Budget (₹) *</label>
        <input name="budget" type="number" step="0.01" class="form-control" value="{{ project.budget|default:'' }}" placeholder="500000" required>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Status</label>
      <select name="status" class="form-select">
        <option value="planning" {% if project.status == 'planning' %}selected{% endif %}>Planning</option>
        <option value="ongoing" {% if project.status == 'ongoing' %}selected{% endif %}>Ongoing</option>
        <option value="completed" {% if project.status == 'completed' %}selected{% endif %}>Completed</option>
        <option value="on_hold" {% if project.status == 'on_hold' %}selected{% endif %}>On Hold</option>
      </select>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Description</label>
      <textarea name="description" class="form-control" rows="3" placeholder="Project details...">{{ project.description|default:'' }}</textarea>
    </div>
    <button class="btn btn-warning w-100 py-2"><i class="bi bi-check-lg me-2"></i>Save Project</button>
  </form>
</div>
{% endblock %}
