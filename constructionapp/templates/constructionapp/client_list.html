{% extends 'constructionapp/base.html' %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">👤 Clients</h1>
  <a href="{% url 'client_add' %}" class="btn btn-warning"><i class="bi bi-plus-lg me-1"></i>Add Client</a>
</div>
<div class="card">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead class="table-light">
        <tr><th>#</th><th>Name</th><th>Phone</th><th>Email</th><th>Address</th><th>Actions</th></tr>
      </thead>
      <tbody>
        {% for c in clients %}
        <tr>
          <td class="text-muted">{{ forloop.counter }}</td>
          <td class="fw-semibold">{{ c.name }}</td>
          <td>{{ c.phone }}</td>
          <td>{{ c.email|default:"-" }}</td>
          <td>{{ c.address }}</td>
          <td>
            <a href="{% url 'client_edit' c.pk %}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
            <a href="{% url 'client_delete' c.pk %}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this client?')"><i class="bi bi-trash"></i></a>
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="6" class="text-center text-muted py-4">No clients yet. <a href="{% url 'client_add' %}">Add one!</a></td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
