{% extends 'constructionapp/user/base.html' %}
{% block content %}
<div class="container mt-4">
  <h3>Worker Search</h3>
  <form method="GET" action="{% url 'user_search' %}">
    <input type="text" name="q" value="{{ query }}" class="form-control mb-3" placeholder="Search workers...">
    <button class="btn btn-primary">Search</button>
  </form>

  <!-- [VULN - XSS #3] query rendered unescaped via mark_safe in views.py -->
  {% if query %}
  <p class="mt-3">Results for: <strong>{{ query }}</strong></p>
  {% endif %}

  {% for worker in results %}
  <div class="card mb-2 p-3">
    <strong>{{ worker.name }}</strong> — {{ worker.role }}
  </div>
  {% empty %}
  {% if query %}<p class="text-muted">No workers found.</p>{% endif %}
  {% endfor %}
</div>
{% endblock %}
