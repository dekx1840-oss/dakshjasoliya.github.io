<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Projects — ConstructPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --luxury-bg: #FAF9F6;          /* Alabaster Warm White */
      --luxury-card: #FFFFFF;
      --luxury-primary: #0F172A;     /* Obsidian Navy */
      --luxury-gold: #C5A880;        /* Luxury Gold */
      --luxury-gold-dark: #A37E58;
      --luxury-gold-light: rgba(197, 168, 128, 0.08);
      --luxury-gold-border: rgba(197, 168, 128, 0.25);
      --luxury-border: rgba(197, 168, 128, 0.15);
      --card-radius: 16px;
    }
    body {
      background: var(--luxury-bg);
      font-family: 'Inter', sans-serif;
      color: var(--luxury-primary);
    }
    .topnav {
      background: var(--luxury-primary);
      padding: 0 32px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }
    .topnav .brand {
      color: white;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topnav .brand-icon {
      background: linear-gradient(135deg, var(--luxury-gold), var(--luxury-gold-dark));
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(197, 168, 128, 0.25);
    }
    .client-badge {
      background: rgba(197, 168, 128, 0.12);
      border: 1px solid rgba(197, 168, 128, 0.25);
      color: var(--luxury-gold);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .main-content {
      padding: 40px 32px;
      max-width: 1140px;
      margin: 0 auto;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: var(--luxury-card);
      border: 1px solid var(--luxury-border) !important;
      border-radius: var(--card-radius) !important;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.02);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(197, 168, 128, 0.3) !important;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06), 0 4px 15px rgba(197, 168, 128, 0.06);
    }
    .card-header {
      background: transparent;
      border-bottom: 1px solid var(--luxury-border);
      padding: 20px 24px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      color: var(--luxury-primary);
    }
    .badge {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .table th {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748B;
      font-weight: 600;
      border-bottom: 1px solid var(--luxury-border);
    }
    .progress {
      border-radius: 10px;
      height: 6px;
      background: #E2E8F0;
    }
    .progress-bar {
      background: linear-gradient(90deg, var(--luxury-gold), var(--luxury-gold-dark)) !important;
      transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .stat-card {
      background: var(--luxury-card);
      border-radius: var(--card-radius);
      padding: 24px;
      border: 1px solid var(--luxury-border);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.02);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--luxury-gold), transparent);
      transform: scaleX(0);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(197, 168, 128, 0.3) !important;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.05);
    }
    .stat-card:hover::after {
      transform: scaleX(1);
    }
    .nav-link-item {
      color: rgba(255,255,255,0.6);
      font-family: 'Outfit', sans-serif;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .nav-link-item:hover {
      color: white;
      background: rgba(255,255,255,0.05);
    }
    .nav-link-item.active {
      color: var(--luxury-gold);
      background: rgba(197, 168, 128, 0.1);
      font-weight: 600;
    }
    .user-dropdown .dropdown-menu {
      border: 1px solid rgba(197, 168, 128, 0.15);
      border-radius: 12px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.12);
      padding: 8px;
      min-width: 200px;
    }
    .user-dropdown .dropdown-item {
      font-family: 'Outfit', sans-serif;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      transition: all 0.2s;
    }
    .user-dropdown .dropdown-item:hover {
      background: var(--luxury-gold-light);
      color: var(--luxury-gold-dark);
      padding-left: 20px;
    }
    .btn-warning {
      background: linear-gradient(135deg, var(--luxury-gold), var(--luxury-gold-dark));
      border: none;
      color: white !important;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(197, 168, 128, 0.25);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-warning:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(197, 168, 128, 0.35);
    }
  </style>
</head>
<body>
<nav class="topnav">
  <div class="d-flex align-items-center gap-4">
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-buildings-fill text-white"></i></div>
      ConstructPro
    </div>
    <div class="nav-links d-none d-md-flex align-items-center gap-2">
      <a href="{% url 'user_dashboard' %}" class="nav-link-item {% if request.resolver_match.url_name == 'user_dashboard' %}active{% endif %}">
        <i class="bi bi-grid-1x2 me-1"></i>Dashboard
      </a>
      <a href="{% url 'user_profile' %}" class="nav-link-item {% if request.resolver_match.url_name == 'user_profile' %}active{% endif %}">
        <i class="bi bi-person me-1"></i>My Profile
      </a>
    </div>
  </div>
  <div class="d-flex align-items-center gap-3">
    <span class="client-badge"><i class="bi bi-person me-1"></i>Client Portal</span>
    <div class="user-dropdown dropdown">
      <button class="btn btn-sm btn-outline-light dropdown-toggle border-0" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="background: transparent; color: white; font-weight: 600;">
        <i class="bi bi-person-circle me-1" style="color: var(--luxury-gold)"></i>{{ request.user.username }}
      </button>
      <ul class="dropdown-menu dropdown-menu-end shadow border-0">
        <li><a class="dropdown-item" href="{% url 'user_profile' %}"><i class="bi bi-person me-2 text-muted"></i>My Profile</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
        <li><a class="dropdown-item text-primary" href="{% url 'login' %}"><i class="bi bi-box-arrow-in-right me-2"></i>Login as Different User</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="main-content">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-success alert-dismissible fade show rounded-3 mb-4 py-3" style="background: rgba(197, 168, 128, 0.1); border: 1px solid rgba(197, 168, 128, 0.2); color: var(--luxury-gold-dark);">
        <i class="bi bi-check-circle-fill me-2"></i>{{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
