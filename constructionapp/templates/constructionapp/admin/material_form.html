{% extends 'constructionapp/admin/base.html' %}
{% block content %}
<div class="page-header"><h1 class="page-title">Add Material — {{ project.name }}</h1><a href="{% url 'admin_project_detail' project.pk %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
<div class="card p-4" style="max-width:600px">
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold">Material Name *</label><input name="name" class="form-control" placeholder="e.g. Cement, Steel, Bricks" required></div>
    <div class="row">
      <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Quantity *</label><input name="quantity" type="number" step="0.01" class="form-control" required></div>
      <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Unit *</label><input name="unit" class="form-control" placeholder="bags, kg, meters" required></div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Unit Price (₹) *</label><input name="unit_price" type="number" step="0.01" class="form-control" required></div>
      <div class="col-md-6 mb-4"><label class="form-label fw-semibold">Stock Alert Level</label><input name="stock_alert" type="number" class="form-control" value="10"></div>
    </div>
    <button class="btn btn-warning w-100 py-2">Save Material</button>
  </form>
</div>
{% endblock %}
