{% extends 'constructionapp/admin/base.html' %}
{% block content %}
<div class="page-header"><h1 class="page-title">Add Task — {{ project.name }}</h1><a href="{% url 'admin_project_detail' project.pk %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
<div class="card p-4" style="max-width:600px">
  <form method="post">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold">Task Title *</label><input name="title" class="form-control" required></div>
    <div class="mb-3"><label class="form-label fw-semibold">Assign Worker</label><select name="worker" class="form-select"><option value="">-- Unassigned --</option>{% for w in workers %}<option value="{{ w.pk }}">{{ w.name }} ({{ w.role }})</option>{% endfor %}</select></div>
    <div class="mb-3"><label class="form-label fw-semibold">Deadline *</label><input name="deadline" type="date" class="form-control" required></div>
    <div class="row">
      <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Priority</label><select name="priority" class="form-select"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
      <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Status</label><select name="status" class="form-select"><option value="pending">Pending</option><option value="in_progress">In Progress</option><option value="completed">Completed</option></select></div>
    </div>
    <div class="mb-4"><label class="form-label fw-semibold">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
    <button class="btn btn-warning w-100 py-2">Save Task</button>
  </form>
</div>
{% endblock %}
