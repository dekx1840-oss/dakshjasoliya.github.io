{% extends 'constructionapp/admin/base.html' %}
{% block content %}
<div class="page-header"><h1 class="page-title">Post Update — {{ project.name }}</h1><a href="{% url 'admin_project_detail' project.pk %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
<div class="card p-4" style="max-width:600px">
  <form method="post" enctype="multipart/form-data">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold">Update Title *</label><input name="title" class="form-control" placeholder="e.g. Foundation Complete, Walls Done" required></div>
    <div class="mb-3"><label class="form-label fw-semibold">Description *</label><textarea name="description" class="form-control" rows="4" placeholder="Describe the progress update..." required></textarea></div>
    <div class="mb-4"><label class="form-label fw-semibold">Progress Photo</label><input name="image" type="file" class="form-control" accept="image/*"><div class="form-text">Upload a photo showing current construction progress</div></div>
    <button class="btn btn-warning w-100 py-2"><i class="bi bi-megaphone me-2"></i>Post Update</button>
  </form>
</div>
{% endblock %}
