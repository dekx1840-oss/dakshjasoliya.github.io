{% extends 'constructionapp/admin/base.html' %}
{% block content %}
<div class="page-header"><h1 class="page-title">Add Expense — {{ project.name }}</h1><a href="{% url 'admin_project_detail' project.pk %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
<div class="card p-4" style="max-width:600px">
  <form method="post" enctype="multipart/form-data">{% csrf_token %}
    <div class="mb-3"><label class="form-label fw-semibold">Title *</label><input name="title" class="form-control" required></div>
    <div class="mb-3"><label class="form-label fw-semibold">Amount (₹) *</label><input name="amount" type="number" step="0.01" class="form-control" required></div>
    <div class="mb-3"><label class="form-label fw-semibold">Date *</label><input name="date" type="date" class="form-control" required></div>
    <div class="mb-3"><label class="form-label fw-semibold">Category</label><select name="category" class="form-select"><option value="material">Material</option><option value="labor">Labor</option><option value="equipment">Equipment</option><option value="transport">Transport</option><option value="other">Other</option></select></div>
    <div class="mb-3"><label class="form-label fw-semibold">Note</label><textarea name="note" class="form-control" rows="2"></textarea></div>
    <div class="mb-4"><label class="form-label fw-semibold">Receipt Image</label><input name="receipt" type="file" class="form-control" accept="image/*"></div>
    <button class="btn btn-warning w-100 py-2">Save Expense</button>
  </form>
</div>
{% endblock %}
