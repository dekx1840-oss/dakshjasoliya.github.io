<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ConstructPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --luxury-primary: #0A0F1A;
      --luxury-secondary: #141A29;
      --luxury-gold: #C5A880;
      --luxury-gold-glow: rgba(197, 168, 128, 0.25);
      --luxury-gold-dark: #A37E58;
      --luxury-text: #E2E8F0;
    }
    body {
      background: radial-gradient(circle at 80% 20%, rgba(197, 168, 128, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 10% 80%, rgba(44, 62, 107, 0.12) 0%, transparent 50%),
                  var(--luxury-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      margin: 0;
      color: var(--luxury-text);
    }
    .login-wrapper {
      width: 100%;
      max-width: 440px;
      padding: 24px;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-card {
      background: rgba(20, 26, 41, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(197, 168, 128, 0.15);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5),
                  inset 0 1px 1px rgba(255, 255, 255, 0.05);
      position: relative;
    }
    .login-card::after {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(197, 168, 128, 0.25) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }
    .brand-area {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      background: linear-gradient(135deg, var(--luxury-gold), var(--luxury-gold-dark));
      width: 76px;
      height: 76px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--luxury-primary);
      margin: 0 auto 20px;
      box-shadow: 0 10px 30px var(--luxury-gold-glow);
      transition: all 0.5s ease;
      cursor: pointer;
    }
    .brand-icon:hover {
      transform: rotate(10deg) scale(1.05);
      box-shadow: 0 15px 35px rgba(197, 168, 128, 0.4);
    }
    .brand-title {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      color: #FFF;
      letter-spacing: 2px;
    }
    .form-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #94A3B8;
      margin-bottom: 8px;
    }
    .input-group {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(10, 15, 26, 0.4);
      transition: all 0.3s ease;
    }
    .input-group:focus-within {
      border-color: var(--luxury-gold);
      box-shadow: 0 0 15px var(--luxury-gold-glow);
      transform: translateY(-1px);
    }
    .input-group-text {
      background: transparent;
      border: none;
      color: var(--luxury-gold);
      padding-left: 16px;
    }
    .form-control {
      background: transparent !important;
      border: none !important;
      color: white !important;
      padding: 14px 16px;
      font-size: 14px;
    }
    .form-control::placeholder {
      color: #475569;
    }
    .form-control:focus {
      box-shadow: none !important;
    }
    .btn-login {
      background: linear-gradient(135deg, var(--luxury-gold), var(--luxury-gold-dark));
      border: none;
      color: var(--luxury-primary) !important;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(197, 168, 128, 0.2);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      top: 0; left: -50%; width: 200%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-25deg);
      transition: 0.75s;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(197, 168, 128, 0.35);
    }
    .btn-login:hover::after {
      left: 125%;
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .role-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(197, 168, 128, 0.08);
      border: 1px solid rgba(197, 168, 128, 0.15);
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 11px;
      color: var(--luxury-gold);
      margin: 4px;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .role-badge:hover {
      background: rgba(197, 168, 128, 0.15);
      transform: translateY(-1px);
    }
    .alert {
      border-radius: 12px;
      font-size: 13px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #FCA5A5;
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="brand-area">
      <div class="brand-icon"><i class="bi bi-buildings-fill"></i></div>
      <h4 class="brand-title mb-1">CONSTRUCTPRO</h4>
      <p class="text-muted small mb-0" style="letter-spacing: 1px;">PREMIUM ARCHITECTURE & DESIGN</p>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}info{% endif %} py-2 rounded-3 small mb-3">
          <i class="bi bi-info-circle-fill me-2"></i>{{ msg }}
        </div>
      {% endfor %}
    {% endif %}

    {% if form.errors %}
      <div class="alert py-2 rounded-3"><i class="bi bi-exclamation-triangle me-2"></i>Invalid credentials. Please try again.</div>
    {% endif %}

    <form method="post">{% csrf_token %}
      <div class="mb-3">
        <label class="form-label">USERNAME</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus autocomplete="off">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">PASSWORD</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-login w-100 mb-3">
        ACCESS PORTAL
      </button>
    </form>

    <div class="text-center mt-4">
      <p class="text-muted small mb-2" style="font-size:10px; letter-spacing:1px;">PORTAL ACCESSIBILITY</p>
      <span class="role-badge"><i class="bi bi-shield-fill me-1"></i>Administrator</span>
      <span class="role-badge"><i class="bi bi-person me-1"></i>Client Portal</span>
    </div>
  </div>
</div>
</body>
</html>
