<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConstructPro — Construction Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
    .sidebar { background: #1a2942; min-height: 100vh; width: 240px; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar .brand { background: #f39c12; padding: 18px 20px; font-size: 1.1rem; font-weight: bold; color: white; display: flex; align-items: center; gap: 8px; }
    .sidebar .nav-link { color: #adb5bd; padding: 12px 20px; border-left: 3px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
    .sidebar .nav-link:hover { color: #fff; background: #243756; border-left: 3px solid #f39c12; }
    .sidebar .nav-link.active { color: #fff; background: #243756; border-left: 3px solid #f39c12; }
    .sidebar .nav-section { color: #6c757d; font-size: 11px; text-transform: uppercase; padding: 16px 20px 4px; letter-spacing: 1px; }
    .main-content { margin-left: 240px; padding: 24px; min-height: 100vh; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: #1a2942; margin: 0; }
    .stat-card { border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .stat-card .icon { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-header { background: white; border-bottom: 1px solid #f0f2f5; font-weight: 600; padding: 16px 20px; border-radius: 12px 12px 0 0 !important; }
    .btn-warning { background: #f39c12; border-color: #f39c12; color: white; }
    .btn-warning:hover { background: #e08e0b; color: white; }
    .table th { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; font-weight: 600; border-top: none; }
    .badge { font-size: 11px; padding: 4px 8px; }
    .topbar { background: white; margin-left: 240px; padding: 12px 24px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 99; }
  </style>
</head>
<body>
<!-- Sidebar -->
<div class="sidebar">
  <div class="brand"><i class="bi bi-buildings-fill"></i> ConstructPro</div>
  <div class="nav-section">Main</div>
  <nav class="nav flex-column">
    <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
  </nav>
  <div class="nav-section">Management</div>
  <nav class="nav flex-column">
    <a class="nav-link {% if 'project' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'project_list' %}">
      <i class="bi bi-building"></i> Projects
    </a>
    <a class="nav-link {% if 'client' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'client_list' %}">
      <i class="bi bi-people-fill"></i> Clients
    </a>
    <a class="nav-link {% if 'worker' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'worker_list' %}">
      <i class="bi bi-person-badge-fill"></i> Workers
    </a>
  </nav>
  <div class="nav-section">System</div>
  <nav class="nav flex-column">
    <a class="nav-link" href="/admin/"><i class="bi bi-gear-fill"></i> Admin Panel</a>
    <a class="nav-link" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> Logout</a>
  </nav>
</div>

<!-- Top Bar -->
<div class="topbar">
  <span class="fw-semibold text-muted">Welcome, {{ request.user.username }} 👋</span>
  <span class="text-muted small"><i class="bi bi-calendar3"></i> Construction Management System</span>
</div>

<!-- Main Content -->
<div class="main-content">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-success alert-dismissible fade show rounded-3 mb-3">
        <i class="bi bi-check-circle-fill me-2"></i>{{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
