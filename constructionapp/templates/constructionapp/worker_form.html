{% extends 'constructionapp/base.html' %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">{{ action }} Worker</h1>
  <a href="{% url 'worker_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card p-4" style="max-width:600px">
  <form method="post">{% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Full Name *</label>
      <input name="name" class="form-control" placeholder="e.g. Suresh Kumar" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Phone Number *</label>
      <input name="phone" class="form-control" placeholder="e.g. 9876543210" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Role / Skill *</label>
      <input name="role" class="form-control" placeholder="e.g. Mason, Electrician, Plumber, Carpenter" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Daily Wage (₹) *</label>
      <input name="daily_wage" type="number" step="0.01" class="form-control" placeholder="e.g. 600" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Joining Date *</label>
      <input name="joining_date" type="date" class="form-control" required>
    </div>
    <button class="btn btn-warning w-100 py-2"><i class="bi bi-check-lg me-2"></i>Save Worker</button>
  </form>
</div>
{% endblock %}
